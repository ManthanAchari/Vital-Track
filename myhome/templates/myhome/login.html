{% extends "myhome/main.html" %}

{% block head %}
<style>
  body{
    margin:0;
    padding:30px 0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    font-family:'Poppins',sans-serif;
}

form{
    width:380px;
    padding:35px;
    border-radius:22px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 8px 32px rgba(0,0,0,0.35);
    color:white;
}

h4{
    text-align:center;
    font-size:28px;
    margin-bottom:20px;
    color:#ffffff;
    letter-spacing:1px;
}

label{
    font-size:15px;
    font-weight:500;
    margin-bottom:6px;
    display:block;
    color:#e2e8f0;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:18px;
    border:none;
    border-radius:14px;
    outline:none;
    background:rgba(255,255,255,0.12);
    color:white;
    font-size:15px;
    box-sizing:border-box;
    transition:0.3s;
}

input:focus{
    background:rgba(255,255,255,0.18);
    box-shadow:0 0 10px rgba(59,130,246,0.5);
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:linear-gradient(45deg,#3b82f6,#06b6d4);
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 0 18px rgba(59,130,246,0.6);
}

a{
    display:block;
    text-align:center;
    margin-top:18px;
    text-decoration:none;
    color:#cbd5e1;
    font-size:15px;
    transition:0.3s;
}

a:hover{
    color:#38bdf8;
}
</style>
{% endblock %}


{% block start %}
<form action="{% url 'loginentry' %}" method="POST">
  <!-- Text Input -->
   {% csrf_token %}
  <h4>Login</h4><br>

  <label for="email">Email:</label><br>
  <input type="email" id="email" name="email" required><br><br>
  
  <label for="pass">Password:</label><br>
  <input type="text" id="pass" name="pass" required><br><br>

  <!-- Submit Button -->
  <button type="submit">Submit</button>

  <a href="{% url 'signup' %}">Sign-up/Register</a>
</form>
{% endblock %}
