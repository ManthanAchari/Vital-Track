{% extends "myhome/main.html" %}
{% load static %}

{% block head %}
<style>
    body{
    margin:0;
    padding:40px 20px;
    /* background:#0f172a; */
    font-family:'Poppins',sans-serif;
    color:white;
    min-height:100vh;

    background:
        linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.85)),
        url('{% static "homeimages/background.jpeg" %}');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    transition:0.5s ease-in-out;
}

/* Dashboard Heading */
h1{
    text-align:center;
    font-size:42px;
    margin-bottom:40px;
    color:#f8fafc;
    letter-spacing:2px;
    text-shadow:0 0 15px rgba(59,130,246,0.5);
}

/* Graph Styling */
img{
    display:block;
    margin:40px auto;
    width:75%;
    border-radius:24px;
    padding:18px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:
        0 8px 32px rgba(0,0,0,0.4),
        0 0 18px rgba(59,130,246,0.25);
    transition:0.4s ease;
}

/* Hover Glow Effect */
img:hover{
    transform:scale(1.02);
    box-shadow:
        0 10px 40px rgba(0,0,0,0.5),
        0 0 28px rgba(6,182,212,0.5);
}

/* Mobile Responsive */
@media(max-width:768px){

    h1{
        font-size:30px;
    }

    img{
        width:95%;
        padding:10px;
    }
}
</style>
{% endblock %}

{% block start %}
<h1> Patient Vitals and Health Trends </h1>

<img src="data:image/png;base64,{{ graph }}" alt="graph" style="display:block; margin-left:auto; margin-right:auto; " width="60%" height="40%">
{% endblock %}
