{% extends "myhome/main.html" %}
{% load static %}

{%  block head %}
<style>body{
    margin:0;
    padding:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Poppins',sans-serif;

    /* Health themed dark background image */
   background:
        linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.85)),
        url('{% static "homeimages/background.jpeg" %}');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    transition:0.5s ease-in-out;
}

h4{
    text-align:center;
    font-size:28px;
    margin-bottom:20px;
    color:#ffffff;
    letter-spacing:1px;
}
/* Form container (using tag selector only) */
form{
    width:380px;
    padding:35px;
    border-radius:22px;

    background:rgba(255,255,255,0.07);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,0.15);
    box-shadow:
        0 10px 35px rgba(0,0,0,0.6),
        0 0 15px rgba(0,255,170,0.08);

    color:white;
}

/* Labels */
label{
    display:block;
    margin-bottom:6px;
    font-size:14px;
    color:#cbd5e1;
    letter-spacing:0.5px;
}

/* Inputs */
input{
    width:100%;
    padding:12px 14px;
    margin-bottom:18px;

    border:none;
    outline:none;
    border-radius:12px;

    background:rgba(255,255,255,0.12);
    color:white;
    font-size:15px;

    transition:0.3s;
    box-sizing:border-box;   
}

/* Focus effect */
input:focus{
    background:rgba(255,255,255,0.18);
    box-shadow:0 0 12px rgba(0,255,170,0.3);
}

/* Button */
button{
    width:100%;
    padding:13px;

    border:none;
    border-radius:14px;

    background:linear-gradient(45deg,#00c6ff,#00ff9d);
    color:#0f172a;

    font-size:16px;
    font-weight:bold;

    cursor:pointer;
    transition:0.3s;
}

/* Hover effect */
button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,255,170,0.25);
}</style>
{% endblock %}


{% block start %}
<form action="{% url 'submit' %}" method="POST">
  {% csrf_token %}
  <!-- Text Input -->
   <h4> Vitals Entry </h4>
  <label for="bp">Blood Pressure:</label><br>
  <input type="text" id="bp" name="bp" required><br><br>

  <label for="sugar">Blood Sugar Level:</label><br>
  <input type="text" id="sugar" name="sugar" required><br><br>

  <label for="oxy">Oxygen level:</label><br>
  <input type="text" id="oxy" name="oxy" required><br><br>

  <label for="pulse">Pulse rate:</label><br>
  <input type="text" id="pulse" name="pulse" required><br><br>

  <label for="temp">Body Temperature:</label><br>
  <input type="text" id="temp" name="temp" required><br><br>

  <!-- Submit Button -->
  <button type="submit">Submit</button>
</form>
{% endblock %}
